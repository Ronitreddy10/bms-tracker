name: BMS High-Speed 24/7 Cloud Tracker (1-2s Loop)

on:
  schedule:
    # Trigger workflow regularly
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  high-speed-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: Run High-Speed 1-2s Continuous Tracker
        env:
          BMS_URL: ${{ secrets.BMS_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Runs high-speed 1-2 second loop directly in the cloud
          python bms_tracker.py
