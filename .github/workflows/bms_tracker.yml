name: BMS 24/7 Ticket & Row Unblock Notifier

on:
  schedule:
    # Run every 5 minutes automatically 24/7 in the cloud
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Previous BMS State
        uses: actions/cache@v4
        with:
          path: bms_state.json
          key: bms-state-${{ github.run_id }}
          restore-keys: |
            bms-state-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: Run BMS Tracker Single Check
        env:
          BMS_URL: ${{ secrets.BMS_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python bms_tracker.py --once

      - name: Save Updated BMS State
        uses: actions/cache/save@v4
        if: always()
        with:
          path: bms_state.json
          key: bms-state-${{ github.run_id }}
